name: Execute Approved Upgrade

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - testnet
          - mainnet
      proposal_object_id:
        description: 'Proposal Object ID (from propose workflow)'
        required: true
        type: string
      github_sha:
        description: 'GitHub commit SHA (from proposal)'
        required: true
        type: string
      skip_verification:
        description: 'Skip on-chain vote verification'
        required: false
        type: boolean
        default: false

jobs:
  verify-and-execute:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment == 'mainnet' && 'production' || inputs.environment }}
      url: https://suiscan.xyz/${{ inputs.environment }}/tx/${{ steps.execute.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.github_sha }}

      - name: Determine CAIP-19 identifier
        id: caip19
        env:
          TESTNET_PACKAGE: sui:testnet/package:0x6979de13c04f24fcaa0443cdf270341f4c0602b22728d530fcb3df92701f70fd
          MAINNET_PACKAGE: sui:mainnet/package:0x6979de13c04f24fcaa0443cdf270341f4c0602b22728d530fcb3df92701f70fd
          PACKAGE_DESCRIPTOR: ${{ vars.PACKAGE_DESCRIPTOR || 'multicoin' }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "mainnet" ]; then
            echo "caip19=$MAINNET_PACKAGE" >> $GITHUB_OUTPUT
          else
            echo "caip19=$TESTNET_PACKAGE" >> $GITHUB_OUTPUT
          fi
          echo "package_descriptor=${PACKAGE_DESCRIPTOR}" >> $GITHUB_OUTPUT

      - name: Verify proposal votes (optional)
        if: ${{ !inputs.skip_verification }}
        env:
          SUI_RPC_URL: ${{ inputs.environment == 'mainnet' && secrets.SUI_RPC_URL_MAINNET || secrets.SUI_RPC_URL_TESTNET }}
          PROPOSAL_ID: ${{ inputs.proposal_object_id }}
        run: |
          echo "🔍 Verifying proposal has sufficient votes..."
          
          if [ -z "$SUI_RPC_URL" ]; then
            echo "⚠️  SUI_RPC_URL not configured, skipping verification"
            exit 0
          fi
          
          RESPONSE=$(curl -s -X POST "$SUI_RPC_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"jsonrpc\": \"2.0\",
              \"id\": 1,
              \"method\": \"sui_getObject\",
              \"params\": [
                \"$PROPOSAL_ID\",
                {
                  \"showContent\": true
                }
              ]
            }")
          
          echo "$RESPONSE" | jq .
          
          # Extract vote count (implementation depends on proposal struct)
          VOTE_COUNT=$(echo "$RESPONSE" | jq -r \
            '.result.content.fields.votes.fields.size // 0')
          
          echo "Current votes: $VOTE_COUNT"
          
          if [ "$VOTE_COUNT" -lt 2 ]; then
            echo "❌ Insufficient votes. Need at least 2 votes."
            exit 1
          fi
          
          echo "✅ Proposal has sufficient votes"

      - name: Execute upgrade
        id: execute
        env:
          SIGNER_API_URL: ${{ secrets.SIGNER_API_URL }}
          SIGNER_API_KEY: ${{ secrets.SIGNER_API_KEY }}
          PACKAGE_CAIP19: ${{ steps.caip19.outputs.caip19 }}
          PACKAGE_DESCRIPTOR: ${{ steps.caip19.outputs.package_descriptor }}
          PROPOSAL_ID: ${{ inputs.proposal_object_id }}
          GITHUB_SHA: ${{ inputs.github_sha }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$SIGNER_API_URL/v1/execute-upgrade" \
            -H "x-api-key: $SIGNER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"package\": \"$PACKAGE_CAIP19\",
              \"package_descriptor\": \"$PACKAGE_DESCRIPTOR\",\
              \"github_sha\": \"$GITHUB_SHA\",
              \"proposalObjectId\": \"$PROPOSAL_ID\",
              \"gasBudget\": 5000000000
            }")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to execute upgrade (HTTP $HTTP_CODE)"
            echo "$BODY" | jq .
            exit 1
          fi
          
          echo "✅ Upgrade executed successfully!"
          echo "$BODY" | jq .
          
          # Extract response fields
          DIGEST=$(echo "$BODY" | jq -r '.digest')
          STATUS=$(echo "$BODY" | jq -r '.status')
          
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          
          echo ""
          echo "========================================"
          echo "✅ UPGRADE EXECUTED SUCCESSFULLY"
          echo "========================================"
          echo "Environment: ${{ inputs.environment }}"
          echo "Transaction: https://suiscan.xyz/${{ inputs.environment }}/tx/$DIGEST"
          echo "Status: $STATUS"
          echo "GitHub SHA: ${{ inputs.github_sha }}"
          echo "Package: ${{ steps.caip19.outputs.caip19 }}"
          echo "========================================"

      - name: Create release tag
        if: ${{ inputs.environment == 'mainnet' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="v$(date +%Y%m%d-%H%M%S)"
          git tag -a "$TAG_NAME" -m "Mainnet upgrade: ${{ inputs.github_sha }}"
          git push origin "$TAG_NAME"
